<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/img/forum.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <title>Fórum - Controle de Fila</title>
</head>
<body class="adm-page adm-control">
    <header class="adm-header">
        <div class="adm-header-content">
            <i class="bi bi-gear header-icon"></i>
            <h1>SISTEMA DE ATENDIMENTO</h1>
        </div>
    </header>
    <main class="adm-main">
        <div class="control-wrapper">
            <nav class="operation-tabs">
                <ul>
                    <li class="tab active" data-section="audiencia" data-label="AUDIÊNCIA">
                        <i class="bi bi-person-video"></i>
                        <span>AUDIÊNCIA</span>
                        <span class="badge" id="badge-audiencia">0</span>
                    </li>
                    <li class="tab" data-section="consulta" data-label="CONSULTA">
                        <i class="bi bi-person-lines-fill"></i>
                        <span>CONSULTA</span>
                        <span class="badge" id="badge-consulta">0</span>
                    </li>
                    <li class="tab" data-section="servicoSocial" data-label="SERVIÇO SOCIAL">
                        <i class="bi bi-people"></i>
                        <span>SERVIÇO SOCIAL</span>
                        <span class="badge" id="badge-servicoSocial">0</span>
                    </li>
                </ul>
            </nav>

            <section class="table-and-session">
                <div class="table-card">
                    <div class="table-header-controls">
                        <h2 id="titulo-lista">AUDIÊNCIA</h2>
                        <div class="header-controls-row">
                            <div class="session-select-wrapper" id="session-card">
                                <select class="selecionar-interno" id="selecao-sessao">
                                    <option value="08:00">SESSÃO 1 - 08:00</option>
                                    <option value="09:00">SESSÃO 2 - 09:00</option>
                                    <option value="10:00">SESSÃO 3 - 10:00</option>
                                    <option value="11:00">SESSÃO 4 - 11:00</option>
                                    <option value="12:00">SESSÃO 5 - 12:00</option>
                                </select>
                            </div>
                            <div class="view-toggle">
                                <button id="btn-view-aguardando" class="view-toggle-btn active">Aguardando</button>
                                <button id="btn-view-chamados" class="view-toggle-btn ">Chamados</button>
                            </div>
                        </div>
                    </div>
                    <div class="table-scroll">
                        <table class="fila-atendimento">
                            <thead>
                                <tr id="header-row">
                                    <th id="header-coluna-cpf">CPF</th>
                                    <th id="header-coluna-2">SESSÃO</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-tabela">
                                <tr><td>-</td><td>-</td></tr>
                                <tr><td>-</td><td>-</td></tr>
                                <tr><td>-</td><td>-</td></tr>
                                <tr><td>-</td><td>-</td></tr>
                                <tr><td>-</td><td>-</td></tr>
                                <tr><td>-</td><td>-</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <div class="control-actions" style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <div id="container-cpf-manual" style="display: none; align-items: center; gap: 10px; background: white; padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <label for="select-cpf-manual" style="font-weight: bold; color: var(--color-letter);">CPF Específico:</label>
                    <select id="select-cpf-manual" style="padding: 5px; border-radius: 3px; border: 1px solid #aaa;">
                        <option value="">(Chamar Próximo da Fila)</option>
                    </select>
                </div>
                <button class="primary-btn" id="select"><i class="bi bi-arrow-counterclockwise"></i> CHAMAR</button>
                <button class="secondary-btn" id="sair"><i class="bi bi-arrow-left-square-fill"></i> SAIR</button>
            </div>
        </div>
    </main>
    <script type="module" src="/src/javascrip/admin/03-pageAdmin.js"></script>
</body>
</html>
