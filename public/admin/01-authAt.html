<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/img/forum.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <title>Fórum - Login ADM</title>
</head>
<body class="adm-page adm-login">
    <header class="adm-header">
        <div class="adm-header-content">
            <img src="../../assets/img/forum.png" alt="Logo do Fórum">
            <h1>SISTEMA DE ATENDIMENTO</h1>
        </div>
    </header>
    <main class="adm-main">
        <section class="login-card">
            <div class="login-title">
                <i class="bi bi-shield-check"></i>
                <h2>Login</h2>
            </div>
            <form id="admin-login-form">
                <label for="admin-email">E-mail</label>
                <input id="admin-email" type="text" required placeholder="Informe seu e-mail">
                <label for="admin-password">Senha</label>
                <input id="admin-password" type="password" required placeholder="Informe sua senha">
                <button class="primary-btn" type="submit">Entrar</button>
            </form>
        </section>
    </main>
    <script type="module" src="/src/javascrip/admin/01-authAt.js"></script>
</body>
</html>
