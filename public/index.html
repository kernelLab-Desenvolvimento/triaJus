<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/forum.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <title>Fórum - Acesso ao Sistema</title>
</head>
<body>
    <aside>
        <div class="container">
            <picture>
                <div class="img">
                    <img src="assets/img/FÓRUM.png" alt="logo do fórum">
                </div>
                <figure>PODER JUDICIÁRIO FÓRUM</figure>
            </picture>
        </div>
    </aside>
    <section>
        <div class="login-card">
            <div class="login-title">
                <i class="bi bi-shield-check"></i>
                <h2>Login</h2>
            </div>
            <form id="login-form">
                <label for="idUser">Usuário</label>
                <input id="idUser" type="text" required placeholder="Informe seu usuário">
                <label for="setor">Setor</label>
                <select id="setor" required style="padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-family: inherit; transition: all 0.3s ease; background: #f8fafc; color: #1a202c; width: 100%; border-color: var(--color-buton);">
                    <option value="" disabled selected>Escolha o setor</option>
                    <option value="Audiência">Audiência</option>
                    <option value="Consulta">Consulta</option>
                    <option value="Serviço Social">Serviço Social</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Início de Atendimento">Início de Atendimento</option>
                </select>
                <button class="primary-btn" type="submit">Entrar</button>
            </form>
        </div>
    </section>
    <script type="module" src="/src/javascrip/login.js"></script>
</body>
</html>
